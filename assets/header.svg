<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset="0.55" stop-color="#120A0D"/>
      <stop offset="1" stop-color="#26070D"/>
    </linearGradient>
    <linearGradient id="red" x1="140" y1="50" x2="1060" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FB7185"/>
      <stop offset="0.45" stop-color="#E11D48"/>
      <stop offset="1" stop-color="#991B1B"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0.88
                0 0.15 0 0 0.02
                0 0 0.15 0 0.08
                0 0 0 0.7 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#FFFFFF" stroke-opacity="0.035"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" rx="22" fill="url(#bg)"/>
  <rect width="1200" height="300" rx="22" fill="url(#grid)"/>

  <circle cx="1030" cy="40" r="190" fill="#E11D48" fill-opacity="0.08"/>
  <circle cx="150" cy="260" r="150" fill="#E11D48" fill-opacity="0.06"/>

  <path d="M95 62H440" stroke="url(#red)" stroke-width="4" stroke-linecap="round"/>
  <path d="M760 238H1105" stroke="url(#red)" stroke-width="4" stroke-linecap="round"/>

  <g filter="url(#glow)">
    <text x="600" y="135"
      text-anchor="middle"
      fill="#F8FAFC"
      font-family="Segoe UI, Arial, sans-serif"
      font-size="56"
      font-weight="800"
      letter-spacing="2">
      BACKEND / FRONTEND
    </text>
    <text x="600" y="196"
      text-anchor="middle"
      fill="url(#red)"
      font-family="Consolas, Menlo, monospace"
      font-size="34"
      font-weight="700"
      letter-spacing="8">
      DEVELOPER
    </text>
  </g>

  <text x="600" y="243"
    text-anchor="middle"
    fill="#A1A1AA"
    font-family="Consolas, Menlo, monospace"
    font-size="20"
    letter-spacing="3">
    GO • VUE 3 • NUXT • TYPESCRIPT • POSTGRESQL
  </text>

  <rect x="1" y="1" width="1198" height="298" rx="21" stroke="#E11D48" stroke-opacity="0.35" stroke-width="2"/>
</svg>
